name: Deploy to Cloudflare Pages

# Post-cutover: production deploy on push to main. Every PR gets a full preview
# deployment with its own URL, posted as a comment.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: "0590763635d2ec576e6d5f9d862c9d6d"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Strip non-served files before upload
        # `wrangler pages deploy .` uploads the entire root, and Cloudflare Pages
        # serves a static asset in preference to a _redirects rule — so the only
        # reliable way to keep the agent docs from being served is to not upload
        # them. Removing them here (on the CI checkout only) leaves _redirects to
        # turn /AGENTS.md and /CLAUDE.md into clean 301s.
        run: rm -f AGENTS.md CLAUDE.md
      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          OUT=$(npx wrangler@4 pages deploy . --project-name=chat-nano-org --branch="$BRANCH" --commit-dirty=true 2>&1)
          echo "$OUT"
          URL=$(echo "$OUT" | grep -oE 'https://[a-z0-9-]+\.chat-nano-org\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔎 **Preview deployed:** ${{ steps.deploy.outputs.url }}`
            })
