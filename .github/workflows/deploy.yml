name: Deploy to Cloudflare Pages

# Production deploy on cloud-migration (retarget to main at cutover).
# Every PR gets a full preview deployment with its own URL, posted as a comment.
on:
  push:
    branches: [cloud-migration]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: "0590763635d2ec576e6d5f9d862c9d6d"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          OUT=$(npx wrangler@4 pages deploy . --project-name=chat-nano-org --branch="$BRANCH" --commit-dirty=true 2>&1)
          echo "$OUT"
          URL=$(echo "$OUT" | grep -oE 'https://[a-z0-9-]+\.chat-nano-org\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔎 **Preview deployed:** ${{ steps.deploy.outputs.url }}`
            })
